<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    
    <link href="./src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <p class="underline text-xs text-gray-800 font-semibold bg-[#f4f4f4] text-center py-3 tracking-wide shadow md:text-base">
     Earn up to $1,000 per month sharing your car on Turo
  </p>
  <div class="w-full px-6 relative mx-auto xl:w-300">
    <header class="flex justify-between items-center w-full h-17 sticky top-0">
      <div class="flex-1">
        <img src="./images/turo-logo1.png"
         class="w-16.5 h-6 md:w-22 md:h-8.5"
        alt="TuroLogo">
      </div>
      <div class="flex-1 justify-end flex gap-x-3.5 mr-4">
        <button class="w-34 h-8 border border-gray-300 rounded-lg text-xs text-gray-700 font-bold">Why choose Turo</button>
        <button class="w-25 h-8 border border-gray-300 rounded-lg text-xs text-gray-700 font-bold">Ask Turo</button>
        <div class="flex items-center gap-2.5 text-[22px] text-gray-600">
          <i class="fa-solid fa-bars"></i>
          <i class="fa-regular fa-circle-user"></i>
        </div>
      </div>
    </header>
    <div class="w-full h-67.5 flex flex-col justify-center items-center rounded-xl 
      mt-4 px-10 lg:h-78 bg-[url(/images/Hero.png)] bg-cover bg-center">
      <h1 class="text-white text-[38px] font-bold">Rental reinvented</h1>
      <p class="text-white text-center font-semibold">Rent the exact car you want, exactly where you need it, for days, weeks, or months</p>
      <!-- MOBILE SEARCH-BAR -->br
      <div class="flex justify-between items-center w-100 h-14 bg-white p-2
       rounded-xl sticky top-0 lg:w-full">
        <p class="lg:hidden text-md text-gray-600 font-base px-2">Search anywhere</p>
        <button class="w-10 h-10 bg-[#593CFB] text-white text-2xl rounded-lg">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
      <!-- DESKTOP SEARCH-BAR -->
      <div class="hidden lg:flex">
        <div>Where<br>
          <input type="text" id="where">
          <label for="where">Airport, hotel, address, city</label>
        </div>
        <div>From<br>

        </div>
        <div><br>

        </div>
        <div>Until<br>
        
        </div>
        <div><br>
        
        </div>
      </div>
    </div>
  </div>
</body>
